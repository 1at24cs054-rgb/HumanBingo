services:
  - type: web
    name: humanbingo-backend
    env: python
    plan: free
    branch: main
    pythonVersion: 3.12.15
    buildCommand: bash -lc 'export RUSTUP_HOME=/tmp/rustup CARGO_HOME=/tmp/cargo PATH=$CARGO_HOME/bin:$PATH; if ! command -v rustup >/dev/null 2>&1; then curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable --profile minimal; fi; source /tmp/rustup/env; rustup default stable; python -m pip install --upgrade pip setuptools wheel; python -m pip install -r requirements.txt'
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    root: backend
    autoDeploy: true
